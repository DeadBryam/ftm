name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-go:
    name: Build Go binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-x64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: macos-x64
          - goos: darwin
            goarch: arm64
            suffix: macos-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-x64
            ext: .exe
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Build web frontend
        shell: bash
        run: |
          cd web-svelte && bun install && bun run build
          rm -rf ../internal/web/static
          cp -r dist ../internal/web/static
          touch ../internal/web/static/.gitkeep

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o ftm-${{ matrix.suffix }}${{ matrix.ext }} ./cmd/ftm
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ftm-${{ matrix.suffix }}
          path: ftm-${{ matrix.suffix }}${{ matrix.ext }}

  release:
    name: Create Release
    needs: [build-go]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*
